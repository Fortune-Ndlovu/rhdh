# This file is for OSD-GCP installation only.
# Operator OSD-GCP jobs merge this with values_showcase.yaml, then strip orchestrator plugin rows
# (see config::strip_orchestrator_plugin_entries_for_osd_gcp in ocp-operator.sh).

# Disable orchestrator for OSD-GCP due to infrastructure limitations
orchestrator: null

# Orchestrator dynamic plugin rows are stripped after merge (config::strip_orchestrator_plugin_entries_for_osd_gcp).
# Setting disabled: true is not enough: the installer still merges them with the catalog and hits
# InstallException: Duplicate plugin configuration for ... orchestrator (GHCR overlay).
